name: Deploy Laravel Docker

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: v2ray

    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        if: github.ref == 'refs/heads/develop'
        run: |
          docker compose -f docker-compose.yml up -d db
          sleep 20

          docker compose run --rm -v $(pwd)/src:/var/www/html -w /var/www/html app bash -c "
            composer install --no-interaction --optimize-autoloader

            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            if ! grep -q '^APP_KEY=' .env || grep -q '^APP_KEY=$' .env; then
              php artisan key:generate --ansi --force
            fi

            APP_KEY_VALUE=\$(grep '^APP_KEY=' .env | sed -n 's/^APP_KEY=//p' | sed 's/^\"//;s/\"$//' | tr -d '[:space:]')

            if [ -z \"\$APP_KEY_VALUE\" ]; then
              php artisan key:generate --ansi --force
              APP_KEY_VALUE=\$(grep '^APP_KEY=' .env | sed -n 's/^APP_KEY=//p' | sed 's/^\"//;s/\"$//' | tr -d '[:space:]')
            fi
            
            if [ -z \"\$APP_KEY_VALUE\" ]; then
              echo \"Ошибка: не удалось извлечь APP_KEY из .env файла\"
              cat .env | grep APP_KEY
              exit 1
            fi

            echo \"APP_KEY установлен (первые 20 символов): \${APP_KEY_VALUE:0:20}...\"

            php artisan migrate --env=testing
            APP_KEY=\"\$APP_KEY_VALUE\" ./vendor/bin/phpunit --colors=always
          "

      - name: Deploy via SSH
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              APP_DIR="/var/www/html/v2ray"
              ENV="prod"
              BUILD_ENV="prod"
            else
              APP_DIR="/var/www/html/v2ray-test"
              ENV="stage"
              BUILD_ENV="dev"
            fi

            cd $APP_DIR

            git config --global --add safe.directory $APP_DIR
            git pull origin $(git rev-parse --abbrev-ref HEAD)

            docker-compose build --build-arg APP_ENV=$BUILD_ENV
            docker-compose up -d

            docker-compose run --rm app composer install --no-interaction --optimize-autoloader

            if [ "$ENV" = "prod" ]; then
              docker-compose run --rm app php artisan migrate --force
            else
              docker-compose run --rm app php artisan migrate
            fi

            docker-compose run --rm app php artisan config:clear
            docker-compose run --rm app php artisan route:clear
            docker-compose run --rm app php artisan view:clear
            docker-compose run --rm app php artisan cache:clear
            docker-compose run --rm app php artisan optimize
