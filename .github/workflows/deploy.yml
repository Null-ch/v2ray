name: Deploy Laravel Docker

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: v2ray

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        if: github.ref == 'refs/heads/develop'
        run: |
          docker compose up -d db
          sleep 20

          docker compose run --rm --user root \
            -v $(pwd)/src:/var/www/html/v2ray/src \
            -w /var/www/html/v2ray/src \
            app bash -c "

              if [ ! -f .env ]; then
                cp .env.example .env
                chown www-data:www-data .env
              fi

              if [ '${{ github.ref }}' = 'refs/heads/main' ]; then
                BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN_PROD }}'
              else
                BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN_DEV }}'
              fi

              export TELEGRAM_BOT_TOKEN=$BOT_TOKEN

              if grep -q '^TELEGRAM_BOT_TOKEN=' .env; then
                sed -i \"s|^TELEGRAM_BOT_TOKEN=.*|TELEGRAM_BOT_TOKEN=\$BOT_TOKEN|\" .env
              else
                echo \"TELEGRAM_BOT_TOKEN=\$BOT_TOKEN\" >> .env
              fi

              chown -R www-data:www-data .env

              composer install --no-interaction

              chown -R www-data:www-data /var/www/html/v2ray/src

              if ! grep -q '^APP_KEY=' .env || grep -q '^APP_KEY=$' .env; then
                su -s /bin/bash www-data -c 'php artisan key:generate --force'
              fi

              su -s /bin/bash www-data -c 'php artisan migrate --env=testing'

              su -s /bin/bash www-data -c './vendor/bin/phpunit --colors=always'
            "

      - name: Deploy via SSH
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              APP_DIR="/var/www/html/v2ray"
              BUILD_ENV="prod"
              BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN_PROD }}"
            else
              APP_DIR="/var/www/html/v2ray-test"
              BUILD_ENV="dev"
              BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN_DEV }}"
            fi

            cd $APP_DIR
            git config --global --add safe.directory $APP_DIR
            git pull origin $(git rev-parse --abbrev-ref HEAD)

            export TELEGRAM_BOT_TOKEN=$BOT_TOKEN
            export APP_ENV=$BUILD_ENV

            docker-compose build --build-arg APP_ENV=$BUILD_ENV
            docker-compose up -d db app web bot

            docker-compose run --rm --user root app bash -c "
              cd /var/www/html/v2ray/src

              composer install --no-interaction --prefer-dist

              if [ ! -f .env ]; then
                cp .env.example .env
                chown www-data:www-data .env
              fi

              if ! grep -q '^APP_KEY=' .env || grep -q '^APP_KEY=$' .env; then
                su -s /bin/bash www-data -c 'php artisan key:generate --force'
              fi

              if grep -q '^TELEGRAM_BOT_TOKEN=' .env; then
                sed -i \"s|^TELEGRAM_BOT_TOKEN=.*|TELEGRAM_BOT_TOKEN=$BOT_TOKEN|\" .env
              else
                echo \"TELEGRAM_BOT_TOKEN=$BOT_TOKEN\" >> .env
              fi

              chown -R www-data:www-data /var/www/html/v2ray/src
            "

            if [ "$BUILD_ENV" = "prod" ]; then
              docker-compose run --rm app php /var/www/html/v2ray/src/artisan migrate --force
            else
              docker-compose run --rm app php /var/www/html/v2ray/src/artisan migrate
            fi

            docker-compose run --rm app php /var/www/html/v2ray/src/artisan route:clear
            docker-compose run --rm app php /var/www/html/v2ray/src/artisan config:clear
            docker-compose run --rm app php /var/www/html/v2ray/src/artisan cache:clear
            docker-compose run --rm app php /var/www/html/v2ray/src/artisan optimize
            docker-compose restart bot