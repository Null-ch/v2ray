name: Deploy Laravel Docker

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: v2ray

    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        if: github.ref == 'refs/heads/develop'
        run: |
          cp src/.env.example src/.env
          docker compose -f docker-compose.yml up -d db
          echo "Waiting for MySQL to be ready..."
          sleep 20
          docker compose run --rm app php artisan key:generate
          docker compose run --rm app php artisan migrate --env=testing
          docker compose run --rm app php artisan test

      - name: Deploy via SSH
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              APP_DIR="/var/www/html/v2ray"
              ENV="prod"
            else
              APP_DIR="/var/www/html/v2ray-test"
              ENV="stage"
            fi

            cd $APP_DIR

            git config --global --add safe.directory $APP_DIR
            git pull origin $(git rev-parse --abbrev-ref HEAD)

            docker-compose up -d --build

            docker-compose run --rm app composer install --no-interaction --optimize-autoloader

            if [ "$ENV" = "prod" ]; then
              docker-compose run --rm app php artisan migrate --force
            else
              docker-compose run --rm app php artisan migrate
            fi

            docker-compose run --rm app php artisan config:clear
            docker-compose run --rm app php artisan route:clear
            docker-compose run --rm app php artisan view:clear
            docker-compose run --rm app php artisan cache:clear
            docker-compose run --rm app php artisan optimize
