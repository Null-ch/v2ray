name: Deploy Laravel

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: v2ray

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              APP_DIR="/var/www/html/v2ray"
              BUILD_ENV="prod"
              BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN_PROD }}"
            else
              APP_DIR="/var/www/html/v2ray-test"
              BUILD_ENV="dev"
              BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN_DEV }}"
            fi

            cd $APP_DIR
            git config --global --add safe.directory $APP_DIR
            git pull origin $(git rev-parse --abbrev-ref HEAD)

            export TELEGRAM_BOT_TOKEN=$BOT_TOKEN
            export APP_ENV=$BUILD_ENV

            # Установка зависимостей
            composer install --no-interaction --prefer-dist
              
            # Создание .env если нет
            if [ ! -f .env ]; then
              cp .env.example .env
              chown www-data:www-data .env
            fi

            # Генерация ключа приложения, если пустой
            if ! grep -q '^APP_KEY=' .env || grep -q '^APP_KEY=$' .env; then
              sudo -u www-data php artisan key:generate --force
            fi

            # Обновление токена Telegram в .env
            if grep -q '^TELEGRAM_BOT_TOKEN=' .env; then
              sed -i "s|^TELEGRAM_BOT_TOKEN=.*|TELEGRAM_BOT_TOKEN=$BOT_TOKEN|" .env
            else
              echo "TELEGRAM_BOT_TOKEN=$BOT_TOKEN" >> .env
            fi

            # Установка прав на папку проекта
            chown -R www-data:www-data $APP_DIR

            # Миграции
            if [ "$BUILD_ENV" = "prod" ]; then
              php artisan migrate --force
            else
              php artisan migrate
            fi

            # Очистка кешей и оптимизация
            php artisan route:clear
            php artisan config:clear
            php artisan cache:clear
            php artisan view:clear
            php artisan optimize
