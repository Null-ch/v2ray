name: Deploy Laravel

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: v2ray

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Определяем директорию и переменные
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              APP_DIR="/var/www/html/v2ray/src"
              BUILD_ENV="prod"
              BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN_PROD }}"
            else
              APP_DIR="/var/www/html/v2ray-test/src"
              BUILD_ENV="dev"
              BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN_DEV }}"
            fi

            cd $APP_DIR

            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

            export TELEGRAM_BOT_TOKEN=$BOT_TOKEN
            export APP_ENV=$BUILD_ENV

            composer install --no-interaction --prefer-dist

            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            if ! grep -q '^APP_KEY=' .env || grep -q '^APP_KEY=$' .env; then
              php artisan key:generate --force
            fi

            if grep -q '^TELEGRAM_BOT_TOKEN=' .env; then
              sed -i "s|^TELEGRAM_BOT_TOKEN=.*|TELEGRAM_BOT_TOKEN=$BOT_TOKEN|" .env
            else
              echo "TELEGRAM_BOT_TOKEN=$BOT_TOKEN" >> .env
            fi

            # Права на запись для Laravel
            chmod -R 775 storage bootstrap/cache

            # Миграции базы данных
            if [ "$BUILD_ENV" = "prod" ]; then
              php artisan migrate --force
            else
              php artisan migrate
            fi

            # Очистка кешей и оптимизация
            php artisan route:clear
            php artisan config:clear
            php artisan cache:clear
            php artisan view:clear
            php artisan optimize
