version: '3.3'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_CONTAINER_NAME}
    working_dir: /var/www/html/v2ray/src
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      COMPOSER_ALLOW_SUPERUSER: 1
      PHP_IDE_CONFIG: serverName=v2ray
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: v2ray
      DB_USERNAME: v2ray
      DB_PASSWORD: CHvcuXdcHECcfMrK
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/var/www/html/v2ray/src

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${QUEUE_CONTAINER_NAME:-v2ray-queue}
    working_dir: /var/www/html/v2ray/src
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV}
      COMPOSER_ALLOW_SUPERUSER: 1
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: v2ray
      DB_USERNAME: v2ray
      DB_PASSWORD: CHvcuXdcHECcfMrK
    command: /docker-queue.sh
    restart: always
    volumes:
      - ./src:/var/www/html/v2ray/src
      - ./docker-queue.sh:/docker-queue.sh

  web:
    image: nginx:alpine
    container_name: ${WEB_CONTAINER_NAME}
    ports:
      - "${DOCKER_APP_PORT}:80"
      - "${DOCKER_SSL_PORT}:443"
    volumes:
      - ./src:/var/www/html/v2ray/src
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - app-network
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: ${DB_CONTAINER_NAME}
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: v2ray
      MYSQL_USER: v2ray
      MYSQL_PASSWORD: CHvcuXdcHECcfMrK
    ports:
      - "${DOCKER_DB_PORT}:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:apache
    container_name: ${PHPMYADMIN_CONTAINER_NAME:-v2ray-phpmyadmin}
    ports:
      - "${PHPMYADMIN_PORT:-8083}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 256M
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${BOT_CONTAINER_NAME}
    working_dir: /var/www/html/v2ray/src
    environment:
      APP_ENV: ${APP_ENV}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: v2ray
      DB_USERNAME: v2ray
      DB_PASSWORD: CHvcuXdcHECcfMrK
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    command: php artisan telegram:bot
    restart: always
    volumes:
      - ./src:/var/www/html/v2ray/src

networks:
  app-network:

volumes:
  dbdata:
