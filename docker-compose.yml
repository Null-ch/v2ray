version: '3.3'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_CONTAINER_NAME}
    working_dir: /var/www/html/v2ray/src
    networks:
      - app-network
    depends_on:
      - db
    environment:
      COMPOSER_ALLOW_SUPERUSER: 1
      PHP_IDE_CONFIG: serverName=v2ray
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/var/www/html/v2ray/src

  web:
    image: nginx:alpine
    container_name: ${WEB_CONTAINER_NAME}
    ports:
      - "${DOCKER_APP_PORT}:80"
      - "${DOCKER_SSL_PORT}:443"
    volumes:
      - ./src:/var/www/html/v2ray/src
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - app-network
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: ${DB_CONTAINER_NAME}
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: v2ray
      MYSQL_USER: v2ray
      MYSQL_PASSWORD: CHvcuXdcHECcfMrK
    ports:
      - "${DOCKER_DB_PORT}:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network

  # ВНИМАНИЕ: Сервис bot автоматически запускает Telegram бота через polling
  # Если вы запускаете бота вручную командой "php artisan telegram:bot",
  # ЗАКОММЕНТИРУЙТЕ или ОСТАНОВИТЕ этот сервис, чтобы избежать конфликтов!
  # Команда для остановки: docker-compose stop bot
  # Команда для удаления: docker-compose rm -f bot
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${BOT_CONTAINER_NAME}
    working_dir: /var/www/html/v2ray/src
    environment:
      APP_ENV: ${APP_ENV}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    networks:
      - app-network
    depends_on:
      - app
    command: php artisan telegram:bot
    restart: always
    volumes:
      - ./src:/var/www/html/v2ray/src

networks:
  app-network:

volumes:
  dbdata:
