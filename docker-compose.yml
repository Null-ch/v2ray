version: '3.3'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_CONTAINER_NAME}
    working_dir: /var/www/html/v2ray/src
    networks:
      - app-network
    depends_on:
      - db
    environment:
      COMPOSER_ALLOW_SUPERUSER: 1
      PHP_IDE_CONFIG: serverName=v2ray
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/var/www/html/v2ray/src

  web:
    image: nginx:alpine
    container_name: ${WEB_CONTAINER_NAME}
    ports:
      - "${DOCKER_APP_PORT}:80"
      - "${DOCKER_SSL_PORT}:443"
    volumes:
      - ./src:/var/www/html/v2ray/src
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - app-network
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: ${DB_CONTAINER_NAME}
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: v2ray
      MYSQL_USER: v2ray
      MYSQL_PASSWORD: CHvcuXdcHECcfMrK
    ports:
      - "${DOCKER_DB_PORT}:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:

volumes:
  dbdata:
